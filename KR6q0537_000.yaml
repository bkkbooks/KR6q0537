body:
  text: 序初祖西來不立語言文字以語言文字求向上一著便非西來大意矣自五宗衍派不能終於無言遂或彙之為傳燈專之為語録名異實同然鉗錘轟辣宗風猶未少降也沿及今日生初祖千餘年後不知千餘年來未開之面目妄襲是非毀譽之迹搖唇鼓舌標榜宗門其淆訛何所窮極今讀我師晦翁語録與初祖西來大意燈燈相印洵宗門之證諦人天之法幢也師自梵參學長而弘法遠近若京口之甘露聖果與檇李之金明楞嚴三塔真如諸剎皆其鍛鍊聖凡處其間一上堂一小參機鋒銛鋭勘辨明確無假借無回互古臨濟周金剛莫之過矣然且刻苦內行終夜趺坐正如無量主夜之神照十方於不絶嘉炎少搜佛乘長而浮沉無悟因證地可著見於文字及歸田而獲叩師座下聆宗語之提唱如飢者之得食合掌歡欣莫可名狀昔黃檗以三頓毒捧大啓濟宗今師拈提宗要烹煆一時龍象其一片婆心詎可埋沒用是登之剞劂照耀昏衢則師之語言文字即師之機權殺奪也然而師之真面目究不在是敬述之以為序時康熙癸未花朝嗣法門人徐嘉炎拜撰晦嶽禪師語録序
